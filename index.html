<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schooner</title>
    <style>
        /* ========== 全局重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ========== 卡片容器 ========== */
        .card {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 56px 48px;
            text-align: center;
        }

        /* ========== 软件名称 ========== */
        .app-title {
            font-size: 40px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
        }

        /* ========== 下载按钮（微软风格） ========== */
        .download-btn {
            display: inline-block;
            padding: 12px 56px;
            background: #0078d4;
            color: #ffffff;
            font-size: 17px;
            font-weight: 500;
            font-family: inherit;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 4px rgba(0, 120, 212, 0.2);
        }

        .download-btn:hover {
            background: #106ebe;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
        }

        .download-btn:active {
            background: #005a9e;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 500px) {
            .card {
                padding: 40px 24px;
            }
            .app-title {
                font-size: 32px;
            }
            .download-btn {
                width: 100%;
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 软件名称 -->
        <h1 class="app-title">Schooner</h1>

        <!-- 下载按钮（直接指向你的 zip 文件） -->
        <a href="https://GITojgio.github.io/Schooner.zip" class="download-btn" download>
            下载 Schooner
        </a>

    </div>

</body>
</html>
