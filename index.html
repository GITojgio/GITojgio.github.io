<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的软件工作室</title>
    <style>
        /* ---------- 全局重置 & 配色 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f4f6fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 40px 35px;
            margin-top: 20px;
        }

        /* ---------- 导航栏 ---------- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-btn:hover {
            background: #e2e8f0;
        }

        .nav-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }

        /* ---------- 页面容器（切换核心） ---------- */
        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- 首页：软件介绍 ---------- */
        .hero h1 {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: #475569;
            line-height: 1.7;
            max-width: 600px;
            margin-bottom: 25px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0 20px;
        }

        .feature-card {
            background: #f8fafc;
            padding: 22px 18px;
            border-radius: 20px;
            border-left: 4px solid #2563eb;
        }

        .feature-card h3 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .feature-card p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        .btn-primary {
            display: inline-block;
            padding: 14px 40px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 18px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }

        /* ---------- 下载列表页 ---------- */
        .download-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .download-header h2 {
            font-size: 28px;
        }

        .badge-new {
            background: #dc2626;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .software-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .software-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 18px 24px;
            border-radius: 18px;
            transition: 0.2s;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid transparent;
        }

        .software-item:hover {
            border-color: #dbeafe;
            background: #f1f5f9;
        }

        .software-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .software-name {
            font-weight: 700;
            font-size: 18px;
        }

        .software-desc {
            color: #64748b;
            font-size: 14px;
        }

        .tag {
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 14px;
            border-radius: 40px;
        }

        .tag.hot {
            background: #fef2f2;
            color: #dc2626;
        }

        .download-link {
            padding: 8px 24px;
            background: #2563eb;
            color: white;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: inline-block;
        }

        .download-link:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* ---------- 空状态/提示 ---------- */
        .empty-tip {
            text-align: center;
            padding: 40px 0;
            color: #94a3b8;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            .hero h1 { font-size: 28px; }
            .navbar { flex-direction: column; align-items: stretch; }
            .nav-buttons { justify-content: center; }
            .software-item { flex-direction: column; align-items: stretch; }
            .download-link { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ====== 导航栏 ====== -->
        <div class="navbar">
            <div class="logo">🚀 我的软件工作室</div>
            <div class="nav-buttons">
                <button class="nav-btn active" data-page="home">🏠 软件介绍</button>
                <button class="nav-btn" data-page="download">📦 下载中心</button>
            </div>
        </div>

        <!-- ====== 页面1：首页 ====== -->
        <div id="page-home" class="page active">
            <div class="hero">
                <h1>
                    让工具 <span>更懂你</span>
                </h1>
                <p>
                    专注开发轻量、实用、干净的桌面与移动工具。
                    所有软件均 <strong>免费</strong> 使用，无广告，无后台。
                </p>

                <div class="feature-grid">
                    <div class="feature-card">
                        <h3>⚡ 极速轻量</h3>
                        <p>安装包小于 5MB，启动速度 < 1 秒</p>
                    </div>
                    <div class="feature-card">
                        <h3>🛡️ 隐私安全</h3>
                        <p>所有数据处理均在本地，不上传云端</p>
                    </div>
                    <div class="feature-card">
                        <h3>💎 纯净体验</h3>
                        <p>无弹窗、无捆绑、无强制更新</p>
                    </div>
                </div>

                <button class="btn-primary" id="goToDownloadBtn">
                    📲 查看所有软件下载
                </button>
            </div>
        </div>

        <!-- ====== 页面2：下载列表 ====== -->
        <div id="page-download" class="page">
            <div class="download-header">
                <h2>
                    🆕 最近新出炉的软件
                    <span class="badge-new">NEW</span>
                </h2>
                <span style="color:#64748b; font-size:14px;">持续更新中 · 全部免费</span>
            </div>

            <div class="software-list" id="softwareList">
                <!-- 数据由 JavaScript 动态渲染，方便你增删改 -->
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. 定义你的软件数据（修改这里即可！）
        // ============================================================
        const softwareData = [
            {
                name: '文本快搜 Pro',
                desc: '全局搜索本地文本文件，秒级定位内容',
                tag: '热门',
                tagType: 'hot',      // 'hot' 或 'normal'
                downloadUrl: 'https://github.com/你的用户名/你的仓库/releases/download/v1.0/TextSearch_Setup.exe'
            },
            {
                name: '图片压缩精灵',
                desc: '批量压缩 JPG/PNG，体积减少 80% 不失真',
                tag: '新上架',
                tagType: 'normal',
                downloadUrl: 'https://github.com/你的用户名/你的仓库/releases/download/v1.0/ImageCompress.zip'
            },
            {
                name: '剪贴板管家',
                desc: '记录最近 50 条复制历史，支持搜索和导出',
                tag: '实用',
                tagType: 'normal',
                downloadUrl: 'https://github.com/你的用户名/你的仓库/releases/download/v1.0/ClipboardManager.exe'
            },
            {
                name: '屏幕尺子',
                desc: '一键测量屏幕上任意两点像素距离',
                tag: '小工具',
                tagType: 'normal',
                downloadUrl: 'https://github.com/你的用户名/你的仓库/releases/download/v1.0/ScreenRuler.exe'
            }
        ];

        // ============================================================
        // 2. 渲染软件列表（自动生成 HTML）
        // ============================================================
        function renderSoftwareList() {
            const container = document.getElementById('softwareList');
            if (!softwareData || softwareData.length === 0) {
                container.innerHTML = `<div class="empty-tip">📭 暂无软件，稍后回来看看~</div>`;
                return;
            }

            let html = '';
            softwareData.forEach(item => {
                const tagClass = (item.tagType === 'hot') ? 'tag hot' : 'tag';
                html += `
                    <div class="software-item">
                        <div class="software-info">
                            <span class="software-name">${item.name}</span>
                            <span class="${tagClass}">${item.tag}</span>
                            <span class="software-desc">${item.desc}</span>
                        </div>
                        <a href="${item.downloadUrl}" class="download-link" target="_blank">
                            ⬇️ 下载
                        </a>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // 3. 页面切换逻辑（首页 ↔ 下载页）
        // ============================================================
        function switchPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 显示目标页面
            const target = document.getElementById('page-' + pageId);
            if (target) target.classList.add('active');

            // 更新按钮高亮
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.page === pageId) {
                    btn.classList.add('active');
                }
            });
        }

        // 导航按钮点击事件
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const page = this.dataset.page;
                switchPage(page);
            });
        });

        // 首页的 "查看所有软件下载" 按钮
        document.getElementById('goToDownloadBtn').addEventListener('click', function () {
            switchPage('download');
        });

        // ============================================================
        // 4. 启动！
        // ============================================================
        renderSoftwareList();

        // 如果你希望默认显示首页，已经默认有了；
        // 如果通过 URL 带参数跳转，可以在这里扩展
        console.log('✅ 网站已加载，软件数量：', softwareData.length);
    </script>

</body>
</html>
